<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bladeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9d00" />
      <stop offset="50%" stop-color="#ff5100" />
      <stop offset="100%" stop-color="#941f00" />
    </linearGradient>
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a373" />
      <stop offset="100%" stop-color="#582f0e" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Glow / Background Highlight -->
  <circle cx="32" cy="32" r="28" fill="#1e140a" stroke="#d28c38" stroke-width="2" opacity="0.9" />
  
  <!-- Axe Design -->
  <!-- Handle (Diagonal) -->
  <rect x="29" y="8" width="6" height="48" rx="3" transform="rotate(-45 32 32)" fill="url(#handleGrad)" />
  
  <!-- Axe Blades (Double Bitted style, rotated to cross the handle) -->
  <g transform="rotate(45 32 32)">
    <!-- Left Blade -->
    <path d="M 30,22 C 20,20 16,14 10,24 C 6,30 6,34 10,40 C 16,50 20,44 30,42 Z" fill="url(#bladeGrad)" filter="url(#glow)" />
    <!-- Right Blade -->
    <path d="M 34,22 C 44,20 48,14 54,24 C 58,30 58,34 54,40 C 48,50 44,44 34,42 Z" fill="url(#bladeGrad)" filter="url(#glow)" />
    <!-- Center Bracket -->
    <rect x="28" y="24" width="8" height="16" rx="2" fill="#3a230f" stroke="#ff9d00" stroke-width="1.5" />
    <!-- Blade Highlights -->
    <path d="M 12,25 C 14,21 18,23 20,24" stroke="#ffebc2" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.8" />
    <path d="M 52,25 C 50,21 46,23 44,24" stroke="#ffebc2" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.8" />
  </g>
  
  <!-- Glowing Chop Sparks -->
  <circle cx="16" cy="18" r="2" fill="#ffebc2" />
  <circle cx="48" cy="46" r="2.5" fill="#ff9d00" />
  <polygon points="44,14 47,15 45,18 43,15" fill="#ff5100" />
  <polygon points="18,48 21,50 19,52 17,50" fill="#ff9d00" />
</svg>